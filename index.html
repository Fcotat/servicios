<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Escolares - EST 18</title>
    <style>
        :root {
            --primary-sec: #0056b3;
            --primary-med: #dc3545;
            --bg-color: #f4f4f9;
        }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: #333; }
        .container { max-width: 600px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 0 auto; }
        .institucion { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        /* Sistema de Pestañas (Tabs) */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background-color: #e0e0e0; color: #555; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;}
        .tab-btn.active-sec { background-color: var(--primary-sec); color: white; }
        .tab-btn.active-med { background-color: var(--primary-med); color: white; }

        /* Formularios */
        .form-section { display: none; }
        .form-section.active { display: block; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px;}
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px;}
        input:read-only { background-color: #f0f0f0; color: #555; cursor: not-allowed; }
        
        /* Botón estilo WhatsApp */
        .btn-enviar { background-color: #25D366; color: white; padding: 14px; border: none; border-radius: 6px; width: 100%; margin-top: 25px; font-size: 16px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.15);}
        .btn-enviar:hover { background-color: #128C7E; }
        .btn-enviar:disabled { background-color: #a5d6a7; cursor: not-allowed; }
        
        /* Mensaje de Carga de Datos */
        #loading { text-align: center; color: #0056b3; font-weight: bold; margin-bottom: 15px; display: block; background: #e3f2fd; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="institucion">Escuela Secundaria Técnica Num. 18</div>
    
    <!-- Alerta de conexión inicial con Google Sheets -->
    <div id="loading">⏳ Conectando con la base de datos de alumnos...</div>

    <div class="tabs">
        <button class="tab-btn active-sec" id="btnSec" onclick="cambiarPestaña('SEC')">📋 Reportes SEC</button>
        <button class="tab-btn" id="btnMed" onclick="cambiarPestaña('MEDICO')">🩺 Médico Escolar</button>
    </div>

    <!-- ================= APARTADO SEC ================= -->
    <div id="sectionSEC" class="form-section active">
        <h2 style="color: var(--primary-sec); text-align: center; margin-top:0;">Servicio Educativo Complementario</h2>
        <form id="formSEC">
            <label for="buscarSEC">Buscar por Matrícula o Nombre:</label>
            <input type="text" id="buscarSEC" list="listaAlumnosData" placeholder="Escribe la matrícula o nombre..." onchange="autocompletar('SEC')" required>

            <label for="grupoSEC">Grado y Grupo:</label>
            <input type="text" id="grupoSEC" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="tutorSEC">Nombre del Tutor:</label>
            <input type="text" id="tutorSEC" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="telefonoSEC">Teléfono del Tutor:</label>
            <input type="text" id="telefonoSEC" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="incidencia">Tipo de Incidencia:</label>
            <select id="incidencia" required>
                <option value="">Selecciona...</option>
                <option value="Inasistencia">Inasistencia</option>
                <option value="Retardo">Retardo</option>
                <option value="Falta de Tarea">Falta de Tarea</option>
                <option value="Indisciplina en Clase">Indisciplina en Clase</option>
                <option value="Felicitación Académica">Felicitación Académica</option>
            </select>

            <label for="detallesSEC">Detalles / Observaciones:</label>
            <textarea id="detallesSEC" rows="4" placeholder="Describe brevemente la situación o acuerdos..." required></textarea>

            <button type="button" class="btn-enviar" id="submitSEC" onclick="enviarFormulario('SEC')">Guardar y Enviar Alerta</button>
        </form>
    </div>

    <!-- ================= APARTADO MÉDICO ================= -->
    <div id="sectionMEDICO" class="form-section">
        <h2 style="color: var(--primary-med); text-align: center; margin-top:0;">Atención Médica Escolar</h2>
        <form id="formMEDICO">
            <label for="buscarMED">Buscar por Matrícula o Nombre:</label>
            <input type="text" id="buscarMED" list="listaAlumnosData" placeholder="Escribe la matrícula o nombre..." onchange="autocompletar('MEDICO')" required>

            <label for="grupoMED">Grado y Grupo:</label>
            <input type="text" id="grupoMED" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="tutorMED">Nombre del Tutor:</label>
            <input type="text" id="tutorMED" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="telefonoMED">Teléfono del Tutor:</label>
            <input type="text" id="telefonoMED" readonly placeholder="Se autocompleta al elegir alumno">

            <label for="motivo">Motivo de la Visita:</label>
            <input type="text" id="motivo" placeholder="Ej. Dolor de estómago, torcedura..." required>

            <label for="tratamiento">Tratamiento Brindado:</label>
            <textarea id="tratamiento" rows="3" placeholder="Ej. Se le tomó la temperatura y se le dio reposo..." required></textarea>

            <label for="estatus">Estatus de Salida:</label>
            <select id="estatus" required>
                <option value="">Selecciona...</option>
                <option value="Regresa a clases en observación">Regresa a clases en observación</option>
                <option value="Se solicita que el tutor pase a recogerlo inmediatamente">⚠️ REQUERIDO: El tutor debe pasar a recogerlo</option>
            </select>

            <button type="button" class="btn-enviar" id="submitMEDICO" onclick="enviarFormulario('MEDICO')">Guardar y Avisar al Tutor</button>
        </form>
    </div>
</div>

<!-- Datalist global para el autocompletado -->
<datalist id="listaAlumnosData"></datalist>

<script>
    // =========================================================
    // PEGA AQUÍ TU URL COMPLETA DE GOOGLE APPS SCRIPT
    // =========================================================
    const WEB_APP_URL = "TU_URL_DE_GOOGLE_APPS_SCRIPT";
    
    let alumnosDB = []; // Se poblará desde el Google Sheet al cargar la página

    // Descargar lista de alumnos desde el Google Sheet en tiempo real
    window.onload = function() {
        fetch(WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            alumnosDB = data;
            const datalist = document.getElementById('listaAlumnosData');
            alumnosDB.forEach(alumno => {
                let option = document.createElement('option');
                // Formato de sugerencia visual: "2601 - SEBASTIAN JIMENEZ SANTIAGO"
                option.value = `${alumno.matricula} - ${alumno.nombre}`;
                datalist.appendChild(option);
            });
            document.getElementById('loading').style.display = 'none'; // Esconder aviso de carga
        })
        .catch(error => {
            document.getElementById('loading').innerText = "❌ Error al sincronizar la base de datos de alumnos.";
            document.getElementById('loading').style.background = "#ffebee";
            document.getElementById('loading').style.color = "#c62828";
            console.error("Error en fetch de alumnos:", error);
        });
    };

    // Función inteligente de auto-rellenado (Busca matrícula, nombre o formato combinado)
    function autocompletar(modulo) {
        const valorBuscado = document.getElementById(`buscar${modulo}`).value.toUpperCase().trim();
        
        const alumnoEncontrado = alumnosDB.find(a => 
            a.nombre === valorBuscado || 
            a.matricula === valorBuscado || 
            `${a.matricula} - ${a.nombre}` === valorBuscado
        );

        if (alumnoEncontrado) {
            // Estabilizar el buscador dejando únicamente el nombre limpio
            document.getElementById(`buscar${modulo}`).value = alumnoEncontrado.nombre;
            
            // Auto-llenar campos fijos combinando Grado y Grupo (Ej. "1 B")
            document.getElementById(`grupo${modulo}`).value = `${alumnoEncontrado.grado} ${alumnoEncontrado.grupo}`;
            document.getElementById(`tutor${modulo}`).value = alumnoEncontrado.tutor;
            document.getElementById(`telefono${modulo}`).value = alumnoEncontrado.telefono;
        } else {
            // Limpiar si el campo queda vacío o inválido
            document.getElementById(`grupo${modulo}`).value = "";
            document.getElementById(`tutor${modulo}`).value = "";
            document.getElementById(`telefono${modulo}`).value = "";
        }
    }

    // Control visual del menú de pestañas
    function cambiarPestaña(modulo) {
        const btnSec = document.getElementById('btnSec');
        const btnMed = document.getElementById('btnMed');
        const secSection = document.getElementById('sectionSEC');
        const medSection = document.getElementById('sectionMEDICO');

        if (modulo === 'SEC') {
            btnSec.classList.add('active-sec'); btnMed.classList.remove('active-med');
            secSection.classList.add('active'); medSection.classList.remove('active');
        } else {
            btnMed.classList.add('active-med'); btnSec.classList.remove('active-sec');
            medSection.classList.add('active'); secSection.classList.remove('active');
        }
    }

    // Procesamiento final de datos y despacho de la alerta
    function enviarFormulario(modulo) {
        const form = document.getElementById(`form${modulo}`);
        const boton = document.getElementById(`submit${modulo}`);

        if (!form.checkValidity()) { form.reportValidity(); return; }

        const alumnoNombre = document.getElementById(`buscar${modulo}`).value.toUpperCase().trim();
        const infoAlumno = alumnosDB.find(a => a.nombre === alumnoNombre);

        if (!infoAlumno) { 
            alert("Por favor, selecciona un alumno válido de la lista desplegable."); 
            return; 
        }

        boton.innerText = "Guardando en Base de Datos...";
        boton.disabled = true;

        let datos = { 
            modulo: modulo,
            alumno: infoAlumno.nombre,
            gradoGrupo: `${infoAlumno.grado} ${infoAlumno.grupo}`,
            tutor: infoAlumno.tutor
        };
        
        let urlWhatsApp = "";
        const telefonoWhatsApp = "52" + infoAlumno.telefono; // Prefijo de México automático

        if (modulo === 'SEC') {
            const incidencia = document.getElementById('incidencia').value;
            const detalles = document.getElementById('detallesSEC').value;
            datos.incidencia = incidencia; datos.detalles = detalles;

            const textoMsg = `Estimado(a) tutor(a) ${infoAlumno.tutor}, le informamos que se ha registrado una incidencia en el Servicio Educativo Complementario de la Escuela Secundaria Técnica Num. 18.\n\n*Alumno:* ${infoAlumno.nombre}\n*Grado y Grupo:* ${infoAlumno.grado} ${infoAlumno.grupo}\n*Situación:* ${incidencia}\n*Detalles:* ${detalles}\n\nFavor de dar el seguimiento correspondiente.`;
            urlWhatsApp = `https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(textoMsg)}`;

        } else if (modulo === 'MEDICO') {
            const motivo = document.getElementById('motivo').value;
            const tratamiento = document.getElementById('tratamiento').value;
            const estatus = document.getElementById('estatus').value;
            datos.motivo = motivo; datos.tratamiento = tratamiento; datos.estatus = estatus;

            const textoMsg = `*AVISO DEL SERVICIO MÉDICO ESCOLAR* 🩺\n\nEstimado(a) tutor(a) ${infoAlumno.tutor}, le informamos que el alumno ${infoAlumno.nombre} de ${infoAlumno.grado} ${infoAlumno.grupo} acudió a la enfermería de la escuela.\n\n*Motivo:* ${motivo}\n*Atención brindada:* ${tratamiento}\n*Indicación:* _${estatus}_\n\nCualquier duda, favor de comunicarse con la institución.`;
            urlWhatsApp = `https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(textoMsg)}`;
        }

        // Envío de datos por método POST a la base de datos de Google Sheets
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        }).then(() => {
            boton.innerText = modulo === 'SEC' ? "Guardar y Enviar Alerta" : "Guardar y Avisar al Tutor";
            boton.disabled = false;
            
            // Lanzar WhatsApp Web o la App móvil
            window.open(urlWhatsApp, '_blank');
            form.reset();
        }).catch(error => {
            alert("Error de red al intentar guardar en el Sheet.");
            boton.disabled = false;
        });
    }
</script>
</body>
</html>
